<!DOCTYPE html>

<script>
// 计算 base path (GitHub Pages 子目录自适应)
// 不使用 <base> 标签,因为它会破坏 Service Worker 的相对路径
window.__YAST_BASE = (function(){
  var path = location.pathname;
  // 如果是 /user/repo/xxx,提取 /user/repo/
  // 如果是 /xxx,返回 /
  var parts = path.split('/').filter(Boolean);
  if (parts.length > 1 && location.hostname.endsWith('.github.io')) {
    return '/' + parts[0] + '/';
  }
  return '/';
})();
</script>
<script>
// 默认设置中文语言
try { if (!localStorage.getItem('Language')) localStorage.setItem('Language', 'zh-CN'); } catch(e) {}
</script>
