<script>
// GitHub Pages 子目录路径自适应
(function(){
  var host = location.hostname;
  var path = location.pathname;
  if (host.endsWith('.github.io')) {
    var seg = path.split('/').filter(Boolean)[0];
    if (seg) document.write('<base href="/' + seg + '/">');
  } else {
    document.write('<base href="/">');
  }
})();
</script>
<script>
// 默认设置中文语言

</script>
